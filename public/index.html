<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test - La Santa Famille 💖</title>
    <style>
        :root {
            --rouge: #b22222;
            --rouge-sombre: #8b0000;
            --or: #ffd700;
        }

        body {
            background: radial-gradient(circle, #fff5f5 0%, #ffe4e1 100%);
            margin: 0;
            padding: 10px;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- COMPTEUR POUR LE CLIENT --- */
        .admin-badge {
            background: var(--rouge);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .header {
            text-align: center;
            max-width: 90%;
            margin-bottom: 60px;
            color: #5d1a1a;
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 15px;
        }

        h1 { font-size: 1.8rem; color: #a11d1d; margin: 10px 0; }
        .intro { font-size: 0.95rem; line-height: 1.5; color: #444; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 120px 20px;
            width: 100%;
            max-width: 1000px;
            padding-top: 40px;
            padding-bottom: 150px;
        }

        .envelope-container {
            position: relative;
            width: 150px;
            height: 100px;
            margin: auto;
            perspective: 1000px;
            animation: farandole 6s ease-in-out infinite;
        }

        .envelope-wrapper {
            position: relative;
            width: 100%; height: 100%;
            background-color: var(--rouge-sombre);
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .flap {
            position: absolute;
            top: 0; width: 0; height: 0;
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            border-top: 60px solid var(--rouge);
            transform-origin: top;
            transition: transform 0.4s;
            z-index: 4;
        }

        .envelope-body {
            position: absolute;
            bottom: 0; width: 100%; height: 100%;
            background-color: var(--rouge);
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--or);
            font-size: 2.5rem;
            font-weight: bold;
        }

        .card {
            position: absolute;
            top: 5px; left: 5px;
            width: 140px; height: 140px;
            background: white;
            border-radius: 8px;
            z-index: 2;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card img { width: 125px; height: 125px; object-fit: cover; border-radius: 4px; }

        .envelope-container.open .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-container.open .card {
            transform: translateY(-110px) scale(1.3);
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        .message-box {
            position: absolute;
            bottom: -110px; width: 180px; left: -15px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            opacity: 0;
            transition: 0.5s 0.6s;
            text-align: center;
            border: 2px solid var(--or);
            z-index: 11;
        }

        .envelope-container.open .message-box { opacity: 1; transform: translateY(10px); }
        .name-tag { color: var(--rouge); font-weight: bold; font-size: 1rem; display: block; }

        @keyframes farandole {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(0, 8px); }
        }

        @media (min-width: 768px) {
            h1 { font-size: 2.5rem; }
            .envelope-container { width: 180px; height: 120px; }
            .flap { border-left: 90px solid transparent; border-right: 90px solid transparent; border-top: 75px solid var(--rouge); }
            .card { width: 160px; height: 160px; }
            .card img { width: 145px; height: 145px; }
            .envelope-container.open .card { transform: translateY(-140px) scale(1.5); }
            .message-box { width: 220px; bottom: -120px; }
        }
    </style>
</head>
<body>

    <div class="admin-badge" id="memberCounter">Vérification des membres...</div>

    <div class="header">
        <h1>💖 La Joie de Donner en Famille  ! ✨</h1>
        <p class="intro">
            Ici, la magie opère… et ce n’est pas juste un simple échange de cadeaux. C’est un moment de cœur, de partage et de bonheur qui nous rassemble.
        </p>
        <p style="font-weight: bold; color: var(--rouge); margin-top: 15px;">
            ✨ Cliquez sur une enveloppe ✉️ pour lancer le tirage !
        </p>
    </div>

    <div id="envelope-grid" class="grid"></div>

    <script>
        // On génère 20 enveloppes numérotées de 1 à 20
        const totalEnvelopes = 20;
        document.getElementById('memberCounter').innerText = `✅ Système prêt : ${totalEnvelopes} Enveloppes`;

        const grid = document.getElementById('envelope-grid');

        for (let i = 1; i <= totalEnvelopes; i++) {
            const container = document.createElement('div');
            container.className = 'envelope-container';
            container.innerHTML = `
                <div class="envelope-wrapper" onclick="toggleEnvelope(this, ${i})">
                    <div class="flap"></div>
                    <div class="card"><img src="" alt="Cadeau"></div>
                    <div class="envelope-body">${i}</div>
                </div>
                <div class="message-box">
                    🎁 Offre ton cadeau à : <br><span class="name-tag">Chargement...</span>
                </div>
            `;
            grid.appendChild(container);
        }

        async function toggleEnvelope(element, number) {
            const container = element.parentElement;
            
            // Si l'enveloppe est déjà ouverte, on ne fait rien
            if (container.classList.contains('open')) return;

            try {
                // Appel au serveur Node.js (ton server.js)
                const response = await fetch(`/choose/${number}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (response.ok) {
                    // On remplit la carte avec les données reçues de MongoDB
                    const cardImg = container.querySelector('.card img');
                    const nameDisplay = container.querySelector('.name-tag');
                    
                    cardImg.src = data.photo; 
                    nameDisplay.innerText = data.name;

                    // On déclenche l'animation d'ouverture
                    container.classList.add('open');
                } else {
                    // Affiche le message d'erreur du serveur (ex: "Déjà utilisé")
                    alert(data.message);
                }
            } catch (err) {
                console.error("Erreur serveur:", err);
                alert("Erreur de connexion au serveur !");
            }
        }
    </script>
</body>
</html>
